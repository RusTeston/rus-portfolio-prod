<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | rus-teston.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                        radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                        radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
                        radial-gradient(2px 2px at 160px 30px, #ddd, transparent);
            background-size: 200px 100px;
            animation: twinkle 4s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }
        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
        }
        .ufo {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 1rem 0 0.5rem;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .code { font-size: 5rem; font-weight: 700; opacity: 0.15; margin-bottom: -1rem; }
        .message { font-size: 1.1rem; color: #94a3b8; margin: 1rem 0; max-width: 400px; margin-inline: auto; }
        .joke {
            font-size: 0.95rem;
            color: #64748b;
            font-style: italic;
            margin: 1.5rem 0;
            padding: 1rem;
            border-left: 3px solid #0ea5e9;
        }
        .home-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(14,165,233,0.4); }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="ufo">🛸</div>
        <div class="code">404</div>
        <h1>Houston, We Have a Problem</h1>
        <p class="message">The page you're looking for has drifted into deep space. It might have been moved, deleted, or never existed in this galaxy.</p>
        <p class="joke">"I told my code to go to space. It said it couldn't find the launch pad... or this page." 🚀</p>
        <a href="https://rus-teston.com" class="home-btn">🏠 Take Me Home</a>
    </div>
</body>
</html>
